window:
  dimensions:
    columns: 135
    lines: 43
  padding:
    x: 10
    y: 10 
  dynamic_padding: false
  decorations: Buttonless
  startup_mode: Windowed

scrolling:
  history: 2000
  multiplier: 3

faux_multiplier: 3

cursor:
  style:
    shape: Beam
    blinking: Always
    blink_interval: 500
    unfocused_hollow: true
    thickness: 0.15

font:
  normal:
    family: DaddyTimeMono Nerd Font Mono
    style: Book
  bold:
    family: FantasqueSansMono Nerd Font Mono
    style: Bold
  italic:
    family: FantasqueSansMono Nerd Font Mono
    style: Italic
  size: 18
  offset:
    x: 0
    y: 0 
  glyph_offset:
    x: 0
    y: 0

custom_cursor_colors: true

